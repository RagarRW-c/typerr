version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: typrr-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - typrr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./typrr-backend
    container_name: typrr-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - typrr-network

  frontend:
    build: ./typrr-frontend
    container_name: typrr-frontend
    restart: unless-stopped
    ports:
      - "5274:80"
    depends_on:
      - backend
    networks:
      - typrr-network

networks:
  typrr-network:
    driver: bridge

volumes:
  postgres-data: