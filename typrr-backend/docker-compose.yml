version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: typrr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: typrr
      POSTGRES_PASSWORD: typrrpassword
      POSTGRES_DB: typrr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: